<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8"/>
		<title>Генератор аккордов</title>
		<style>
      /* --- ОСНОВНЫЕ СТИЛИ СТРАНИЦЫ --- */
/* --- ОСНОВНЫЕ СТИЛИ СТРАНИЦЫ --- */
body {
    font-family: "Courier New", monospace;
    margin: 0; /* Это обнуление остается */
    background: #1e1e1e;
    color: #d4d4d4;
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
}

#output {
    white-space: pre-wrap;
    line-height: 1.5;
    margin-bottom: 15px;
    min-height: 300px;
    padding: 15px;
    background: #2d2d2d;
    border: 1px solid #444;
    overflow-y: auto;
    word-break: break-word;
}

.input-line {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: #2d2d2d;
    border: 1px solid #444;
}

.prompt {
    color: #4ec9b0;
    font-size: 18px;
    align-self: center;
}

#input {
    flex: 1;
    padding: 8px 12px;
    font-family: "Courier New", monospace;
    font-size: 15px;
    background: #3c3c3c;
    color: #fff;
    border: none;
}

#input:focus {
    outline: 2px solid #007acc;
}

/* --- НОВЫЕ СТИЛИ ДЛЯ ТАБЛИЦЫ ТОНАЛЬНОСТЕЙ --- */
table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    word-break: keep-all;
}

th, td {
    padding: 8px;
    border: 1px solid #444;
    white-space: nowrap;
    text-overflow: ellipsis; /* Ставим троеточие ... если текст обрезан */
}

th {
    background-color: #333;
    font-weight: bold;
}

td {
    background-color: #2d2d2d;
}

td {
    cursor: help; /* Меняем курсор на знак вопроса */
}

td:hover::after {
    content: "👈" attr(data-full-text);
    position: absolute;
    background: #252526;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 6px 10px;
    z-index: 100;
    color: #d4d4d4;
    font-size: 14px;
    font-family: "Courier New", monospace;
    white-space: normal;
    word-break: break-word;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
}

/* --- СТИЛИ ДЛЯ ТАБУЛАТУР (с изменениями) --- */
.chord-diagram-container {
    display: block; /* Каждый блок на новой строке */
    margin-top: 5px;
    text-align: left;
}

.chord-diagram {
    display: flex;
    flex-direction: column;
    font-family: "Courier New", monospace;
    font-size: 14px; /* Уменьшаем шрифт */
    color: #fff;
    background-color: #333;
    border: 2px solid #555;
    border-radius: 4px;
    padding: 8px;
    width: fit-content; /* Ширина по содержимому */
    max-width: 300px; /* Новая ширина */
    margin-right: 10px; /* Отступ справа для нескольких схем */
    box-sizing: border-box; /* Включаем padding в общую ширину */
}

.chord-name {
    font-weight: bold;
    text-align: center;
}

.chord-string {
    display: flex;
    align-items: center; /* Выравниваем по центру по вертикали */
}

/* --- НОВЫЕ СТИЛИ ДЛЯ РАВНОГО РАЗМЕРА БОКСОВ (ключевое изменение) --- */
.chord-diagram .chord-string {
     margin-bottom: -3px; /* Убирает зазор между строками схемы */
}

.chord-diagram .chord-fret,
.chord-diagram .chord-fret-x {
     display: flex; /* Для центрирования содержимого */
     justify-content: center;
     align-items: center;
     width: 11px; /* Единая ширина для всех боксов */
     height: 18px; /* Единая высота */
     margin-right: 2px; /* Отступ между боксами */
     font-weight: bold;
     font-size: 12px; /* Единый размер шрифта */
     box-sizing: border-box; /* Чтобы padding не влиял на размер */
 }

/* Стиль для крестика (теперь наследует размер) */
.chord-diagram .chord-fret-x {
     color: red; /* Красный цвет для 'x' остается */
 }

/* Выводим содержимое бокса через псевдоэлемент, чтобы сам бокс не менял размер */
.chord-diagram .chord-fret {
     font-size: 0; /* Обнуляем шрифт у контейнера */
 }

.chord-diagram .chord-fret::before {
     content: attr(data-content); /* Берем текст из атрибута data-content */
     font-size: 12px; /* Задаем нужный размер шрифта здесь */
     line-height: 18px; /* Центрируем по вертикали (равно высоте бокса) */
 }

/* --- СТИЛИ ДЛЯ ФОРМЫ С ЧЕКБОКСАМИ (без изменений) --- */
#chord-checkboxes {
   display: flex;
   flex-direction: column;
   gap: 2px;
   line-height: 1;
}

.chord-checkbox {
   display: flex;
   align-items: center;
   gap: 6px;
   margin-bottom: 0; /* Главная правка для чекбоксов */
}

.chord-checkbox input[type="checkbox"] {
   transform: translateY(-8px);
   position: relative;
}

/* --- НОВЫЕ СТИЛИ ДЛЯ КНОПОК (без изменений) --- */
button,
  .select-all-btn,
  .deselect-all-btn,
  .ready-btn,
  .chord-button-group[type="submit"] {
    /* Унифицированные отступы (padding) */
    padding: 8px 16px; /* Вертикальный и горизонтальный отступ */
    
    /* Базовые стили */
    font-family: "Courier New", monospace;
    font-size: 15px;
    color: #d4d4d4; /* Светло-серый текст */
    background-color: #3c3c3c; /* Темно-серый фон */
    border-radius: 4px; /* Скругленные углы */
    border: none; /* Убираем стандартную рамку */
    
    /* Интерактивность */
    cursor: pointer; /* Меняем курсор на руку */
    
    /* Плавные переходы для эффектов */
    transition:
      background-color 0.2s ease, /* Плавная смена фона */
      transform 0.1s ease, /* Плавное смещение */
      box-shadow 0.2s ease; /* Плавная тень
      */
    
    /* Тень для глубины */
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
    
    /* Чтобы кнопки в одной строке не прилипали друг к другу */
    margin-right: 8px; 
    margin-top: 4px;
    margin-bottom: 4px;
    
    min-width: fit-content; /* Минимальная ширина по контенту */
  }

  /* Эффект при наведении курсора (подсветка) */
  button:hover,
  .select-all-btn:hover,
  .deselect-all-btn:hover,
  .ready-btn:hover {
    background-color: #4ec9b0; /* Ярко-бирюзовый фон при наведении */
    color: #1e1e1e; /* Черный текст для контраста */
    
    /* Поднимаем кнопку немного вверх, создавая эффект объема */
    transform: translateY(-2px);
    
    /* Убираем нижнюю тень, так как кнопка "оторвалась" от фона */
    box-shadow:
      inset 0 -2px 0 rgba(0,0,0,0.2),
      0 4px 6px rgba(76,201,176,0.4); /* Добавляем новую, более светлую тень */
  }

  /* Эффект при нажатии (отзывчивость) */
  button.active,
  .select-all-btn.active,
  .deselect-all-btn.active,
  .ready-btn.active {
    background-color: #007acc; /* Темно-синий фон при нажатии */
    
    /* Смещаем кнопку вниз, имитируя физическое нажатие */
    transform: translateY(2px);
    
    box-shadow:
      inset 0 -2px 0 rgba(0,0,0,0.2),
      inset 0 4px 6px rgba(0,122,204,0.3); /* Тень "внутрь" кнопки */
      
    outline: none; /* Убираем обводку в Firefox при клике */
  }
    </style>
	</head>

}
